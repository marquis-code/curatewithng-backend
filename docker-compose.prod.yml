services:
  reverse-proxy:
    image: traefik:v3.6
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.errandersresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.errandersresolver.acme.email=hello@erranders.org" # Adjust to your Let's Encrypt email
      - "--certificatesresolvers.errandersresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - erranders-net
    labels:
      - "traefik.enable=true"
      # HTTP-to-HTTPS Redirect
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/var/lib/redis/data
    networks:
      - erranders-net

  api:
    image: "${DOCKER_IMAGE:-ghcr.io/marquis-code/curatewithng-backend:latest}" # GHCR Image built and pushed via GitHub Actions
    restart: unless-stopped
    depends_on: [reverse-proxy, redis]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - erranders-net
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.api.rule=Host(`api.curatewithng.com`)" # Adjust to your production domain
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=errandersresolver"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

networks:
  erranders-net:

volumes:
  redis_data:
