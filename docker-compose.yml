version: '3.8'

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - erranders-net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    networks:
      - erranders-net

networks:
  erranders-net:
    driver: bridge

volumes:
  redis_data:
